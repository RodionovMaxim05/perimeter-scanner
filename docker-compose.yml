services:
  perimeter-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: perimeter-scanner
    env_file:
      - .env
    environment:
      TZ: Europe/Moscow
    volumes:
      - ./config/config.yaml:/config.yaml
    network_mode: "host"
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      migrator:
        condition: service_completed_successfully

  postgres:
    image: postgres:17-alpine
    container_name: perimeter-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-perimeter-scanner}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 5

  migrator:
    image: migrate/migrate
    network_mode: "host"
    volumes:
      - ./migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@localhost:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-perimeter-scanner}?sslmode=${POSTGRES_SSLMODE:-disable}
      up
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
